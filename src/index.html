<!DOCTYPE html>
<html>
    <head>
        <title>Archipela-GO!</title>
        <link rel="manifest" href="manifest.json" />
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <section id="page-connect" style="display: none;">
            <h1>Archipela-GO!</h1>
            <h2>Connect to server</h2>
            <form class="gridform" id="connect-form">
                <label for="ip">Address</label><input autocapitalize="off" autocorrect="off" id="ip" inputmode="url" maxlength="255" name="ip" placeholder="archipelago.gg" required spellcheck="false" pattern="[a-zA-Z0-9](([a-zA-Z0-9]|-)*[a-zA-Z0-9])?(\.[a-zA-Z0-9](([a-zA-Z0-9]|-)*[a-zA-Z0-9])?)*">
                <label for="port">Port</label><input id="port" min="0" max="65535" name="port" placeholder="38281" required type="number">
                <label for="player">Player Name</label><input autocapitalize="off" autocorrect="off" id="player" maxlength="16" name="player" required spellcheck="false">
                <label for="password">Password</label><input id="password" maxlength="255" name="password" type="password">
                <button id="set-home" type="button" aria-haspopup="dialog">Set Home Location…</button>
                <button id="open-advanced-settings" type="button" aria-haspopup="dialog">Advanced Settings…</button>
                <button id="connect" type="submit"></button>
            </form>
            <span id="connection-message"></span>
            <div class="spacer"></div>
            <div class="license">
                <a href="https://github.com/impiaaa/ap-go-web-client" target="_blank">Source code</a>
            </div>
            <dialog id="set-home-dialog" closedby="any" aria-label="Set home location on map">
                <div id="set-home-map" class="map-container"></div>
                <button id="save-home">Save</button>
            </dialog>
            <dialog id="advanced-settings-dialog" closedby="any">
                <h2>Advanced Settings</h2>
                <form class="gridform" id="advanced-settings-form">
                    <label for="overpass-server">Overpass Server</label>
                    <input id="overpass-server" name="overpass-server" type="url" list="overpass-servers" required value="https://overpass.private.coffee/api/interpreter">
                    <datalist id="overpass-servers">
                        <option>https://overpass-api.de/api/interpreter</option>
                        <option>https://maps.mail.ru/osm/tools/overpass/api/interpreter</option>
                        <option selected>https://overpass.private.coffee/api/interpreter</option>
                        <option>https://overpass.geofabrik.de/YOUR_API_KEY/api/interpreter</option>
                        <option>https://overpass.osm.ch/api/interpreter</option>
                        <option>https://overpass.atownsend.org.uk/api/</option>
                        <option>https://overpass.maprva.org/api/interpreter</option>
                        <option>https://ethiopia.overpass.openplaceguide.org/api/interpreter</option>
                    </datalist>
                    <label for="overpass-query">Overpass Query</label>
                    <textarea autocapitalize="off" autocomplete="off" autocorrect="off" id="overpass-query" maxlength="262144" name="overpass-query" spellcheck="false" wrap="off"></textarea>
                    <button id="save-advanced-settings">Save</button>
                </form>
            </dialog>
        </section>
        <section id="page-map" style="display: none;">
            <div id="map" class="map-container"></div>
        </section>
        <section id="page-log" style="display: none;">
            <div class="log" id="text-log"></div>
            <form id="text-input">
                <input autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Send text or a command to the Archipelago server">
            </form>
        </section>
        <section id="page-hints" style="display: none;">
            <table id="hint-table">
                <thead>
                    <tr>
                        <th>Receiving Player</th>
                        <th>Item</th>
                        <th>Finding Player</th>
                        <th>Location</th>
                        <th>Entrance</th>
                        <th>Found</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <nav>
            <ul role="tablist">
                <li><a role="tab" aria-controls="page-connect" href="#connect">Connect</a></li>
                <li><a role="tab" aria-controls="page-map" href="#map">Map</a></li>
                <li><a role="tab" aria-controls="page-log" href="#log">Log</a></li>
                <li><a role="tab" aria-controls="page-hints" href="#hints">Hints</a></li>
            </ul>
        </nav>
        <dialog id="trap-dialog" closedby="any">
            <h2></h2>
            <img>
            <p>Tap to dismiss</p>
        </dialog>
    </body>
</html>
