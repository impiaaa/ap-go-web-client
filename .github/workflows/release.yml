name: Create release zip

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: latest
        cache: 'npm'
    - run: npm ci
    - run: npm run zip

    - uses: softprops/action-gh-release@v3
      with:
        files: ap-go-web-client-v*.*.zip
        fail_on_unmatched_files: true