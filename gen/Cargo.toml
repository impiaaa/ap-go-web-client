[package]
name = "gen"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
geo = { version = "0.32", default-features = false }
getrandom = { version = "0.2.17", default-features = false, features = ["js"] }
wasm-bindgen = { version = "0.2", default-features = false }
web-sys = { version = "0.3.94", features = ["DedicatedWorkerGlobalScope", "MessageEvent", "console"] }
